<!doctype html><html lang="sk"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TikTok prepojenie — FacelessFactory</title>
<style>
  body{font:16px/1.5 system-ui,sans-serif;max-width:620px;margin:60px auto;padding:0 20px;color:#1a1a1a}
  h1{font-size:22px}
  textarea{width:100%;height:90px;font:14px monospace;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
  button{background:#fe2c55;color:#fff;border:0;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px}
  .err{color:#c0392b} .ok{color:#1fa463}
  .hint{color:#666;font-size:14px}
</style></head><body>
<h1>🎬 TikTok prepojenie</h1>
<div id="out"><p class="hint">Načítavam…</p></div>
<script>
  var p = new URLSearchParams(location.search);
  var code = p.get('code'), err = p.get('error'), out = document.getElementById('out');
  if (err) {
    out.innerHTML = '<p class="err">Prepojenie zamietnuté: ' + err + '. Skús znova.</p>';
  } else if (code) {
    out.innerHTML =
      '<p class="ok">✅ Hotovo! Skopíruj tento kód a vlož ho do terminálu (tam kde beží skript):</p>' +
      '<textarea id="c" readonly>' + code + '</textarea>' +
      '<br><button onclick="navigator.clipboard.writeText(document.getElementById(\'c\').value);this.textContent=\'Skopírované ✔\'">Kopírovať kód</button>' +
      '<p class="hint">Potom sa vráť do terminálu a kód vlož.</p>';
  } else {
    out.innerHTML = '<p class="hint">Táto stránka je callback pre TikTok prihlásenie. Otvorí sa sem po kliknutí Authorize.</p>';
  }
</script>
</body></html>
